# .github/workflows/atualizar-historico.yml
#
# Atualiza os JSONs históricos (mega-sena, lotofácil, quina) buscando
# apenas os concursos novos da API da Caixa e fazendo commit no repo.
# O Netlify republica automaticamente a cada commit → analisador sempre atualizado.
#
# Agenda:
#   - Mega-Sena: sorteios às 20h BRT nas quartas e sábados
#   - Lotofácil: sorteios às 20h BRT de segunda a sábado
#   - Quina:     sorteios às 20h BRT de segunda a sábado
#
# O workflow roda às 22h BRT (01h UTC do dia seguinte) para garantir que
# a API da Caixa já publicou o resultado antes de buscar.
# Também pode ser disparado manualmente.

name: Atualizar Histórico de Loterias

on:
  schedule:
    # 01:00 UTC = 22:00 BRT — após todos os sorteios do dia
    # Roda de segunda a sábado (dias com pelo menos um sorteio)
    - cron: '0 1 * * 2-7'

  # Permite disparo manual pelo GitHub Actions UI
  workflow_dispatch:
    inputs:
      forcar:
        description: 'Forçar commit mesmo sem mudanças'
        required: false
        default: 'false'

jobs:
  atualizar:
    name: Buscar concursos novos e atualizar JSONs
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # 1. Checkout do repositório
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      # 2. Configurar Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # 3. Rodar o script de atualização
      - name: Atualizar históricos
        run: node atualizar-historico.js
        env:
          NODE_OPTIONS: '--experimental-vm-modules'

      # 4. Verificar se houve mudanças
      - name: Verificar mudanças nos JSONs
        id: check
        run: |
          if git diff --quiet -- mega-sena-historico.json lotofacil-historico.json quina-historico.json; then
            echo "mudancas=false" >> $GITHUB_OUTPUT
            echo "Nenhum JSON foi alterado."
          else
            echo "mudancas=true" >> $GITHUB_OUTPUT
            echo "JSONs alterados:"
            git diff --stat -- mega-sena-historico.json lotofacil-historico.json quina-historico.json
          fi

      # 5. Commit e push (só se houve mudanças — ou forçado)
      - name: Commit e push dos JSONs atualizados
        if: steps.check.outputs.mudancas == 'true' || github.event.inputs.forcar == 'true'
        run: |
          git config user.name  "palpitiar-bot"
          git config user.email "bot@palpitiar.com.br"

          # Adiciona apenas os JSONs históricos (não outros arquivos)
          git add mega-sena-historico.json lotofacil-historico.json quina-historico.json

          # Mensagem de commit com resumo das mudanças
          MEGA=$(node -e "
            const d = JSON.parse(require('fs').readFileSync('mega-sena-historico.json'));
            console.log(d.meta.ultimoConcurso + ' (' + d.meta.totalConcursos + ')');
          ")
          LOTO=$(node -e "
            const d = JSON.parse(require('fs').readFileSync('lotofacil-historico.json'));
            console.log(d.meta.ultimoConcurso + ' (' + d.meta.totalConcursos + ')');
          ")
          QUINA=$(node -e "
            const d = JSON.parse(require('fs').readFileSync('quina-historico.json'));
            console.log(d.meta.ultimoConcurso + ' (' + d.meta.totalConcursos + ')');
          ")

          git commit -m "chore: atualiza histórico de loterias $(date -u '+%Y-%m-%d')

          Mega-Sena: concurso $MEGA
          Lotofácil: concurso $LOTO
          Quina:     concurso $QUINA

          [skip ci]"

          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 6. Log final
      - name: Resumo
        run: |
          echo "=== Resumo final ==="
          node -e "
            ['mega-sena','lotofacil','quina'].forEach(n => {
              const d = JSON.parse(require('fs').readFileSync(n + '-historico.json'));
              console.log(n + ': concurso ' + d.meta.ultimoConcurso + ' | ' + d.meta.totalConcursos + ' draws | ' + d.meta.ultimaData);
            });
          "
